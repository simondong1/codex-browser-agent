name: Release Builds

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: Create/attach release assets
        required: false
        type: boolean
        default: false
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: win
          - os: macos-latest
            target: mac
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Upgrade npm (Windows)
        if: runner.os == 'Windows'
        run: npm install -g npm@10.9.2

      - name: Install dependencies (macOS)
        if: runner.os != 'Windows'
        run: npm ci --include=dev

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          npm cache clean --force
          npm ci --include=dev --no-audit --no-fund

      - name: Verify build toolchain
        run: node -e "require.resolve('electron/package.json'); require.resolve('electron-builder/package.json'); require.resolve('vitest/package.json')"

      - name: Run tests
        run: npx vitest run

      - name: Build desktop app
        run: npx electron-builder --publish never --${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codex-browser-agent-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.msi
            dist/*.blockmap

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.publish_release == 'true'
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/*.dmg
            release-assets/**/*.zip
            release-assets/**/*.exe
            release-assets/**/*.msi
            release-assets/**/*.blockmap
